<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>IIoT Sentinel — Industrial Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Inter:wght@300;400;500;600;700&display=swap');

  :root {
    --bg0: #080c14;
    --bg1: #0d1424;
    --bg2: #111a30;
    --bg3: #16213e;
    --border: rgba(99,179,237,0.12);
    --accent: #63b3ed;
    --accent2: #a78bfa;
    --green: #48bb78;
    --yellow: #ecc94b;
    --red: #fc8181;
    --red2: #e53e3e;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --text3: #64748b;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Inter', sans-serif;
    --glow: 0 0 20px rgba(99,179,237,0.15);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg0); color: var(--text); font-family: var(--sans); overflow-x: hidden; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg1); }
  ::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }

  /* ── Layout ── */
  .app { display: grid; grid-template-rows: 60px 1fr; min-height: 100vh; }

  /* ── Header ── */
  header {
    background: var(--bg1);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px;
    position: sticky; top: 0; z-index: 100;
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon {
    width: 32px; height: 32px; border-radius: 8px;
    background: linear-gradient(135deg, #1e3a5f, #2d5a9e);
    border: 1px solid rgba(99,179,237,0.4);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }
  .logo-text { font-family: var(--mono); font-weight: 600; font-size: 15px; color: var(--accent); }
  .logo-sub  { font-size: 10px; color: var(--text3); letter-spacing: 2px; text-transform: uppercase; margin-top: 1px; }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .conn-badge {
    display: flex; align-items: center; gap: 6px;
    font-family: var(--mono); font-size: 11px; color: var(--text2);
    background: var(--bg2); border: 1px solid var(--border);
    padding: 4px 10px; border-radius: 4px;
  }
  .conn-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .ts-display { font-family: var(--mono); font-size: 11px; color: var(--text3); }

  /* ── Main ── */
  main { display: grid; grid-template-columns: 1fr 300px; gap: 0; overflow: hidden; }

  /* ── Left panel ── */
  .left { padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }

  /* ── Section labels ── */
  .section-label {
    font-family: var(--mono); font-size: 10px; color: var(--text3);
    letter-spacing: 2px; text-transform: uppercase;
    display: flex; align-items: center; gap: 8px; margin-bottom: 2px;
  }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* ── Sensor cards grid ── */
  .sensor-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }

  .sensor-card {
    background: var(--bg1);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.15s;
    position: relative; overflow: hidden;
  }
  .sensor-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: var(--card-color, var(--accent));
    border-radius: 10px 10px 0 0;
  }
  .sensor-card:hover { border-color: rgba(99,179,237,0.35); transform: translateY(-1px); }
  .sensor-card.active { border-color: var(--card-color, var(--accent)); box-shadow: var(--glow); }
  .sensor-card.status-WARNING  { --card-color: var(--yellow); }
  .sensor-card.status-CRITICAL { --card-color: var(--red); animation: card-flash 0.8s infinite; }
  @keyframes card-flash { 0%,100%{border-color:rgba(252,129,129,0.4)} 50%{border-color:rgba(229,62,62,0.9)} }

  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .card-name { font-family: var(--mono); font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; }
  .card-status {
    font-size: 9px; font-weight: 600; letter-spacing: 1px;
    padding: 2px 6px; border-radius: 3px;
  }
  .status-NORMAL   .card-status { background: rgba(72,187,120,0.15); color: var(--green); }
  .status-WARNING  .card-status { background: rgba(236,201,75,0.15);  color: var(--yellow); }
  .status-CRITICAL .card-status { background: rgba(229,62,62,0.15);   color: var(--red); }

  .card-value { font-family: var(--mono); font-size: 30px; font-weight: 600; color: var(--text); line-height: 1; }
  .card-unit  { font-family: var(--mono); font-size: 12px; color: var(--text3); margin-left: 4px; }
  .card-mini-chart { margin-top: 10px; height: 36px; }

  /* ── Main chart ── */
  .chart-card {
    background: var(--bg1);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
  }
  .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .chart-title { font-family: var(--mono); font-size: 13px; color: var(--accent); font-weight: 500; }
  .chart-controls { display: flex; gap: 6px; }
  .ctrl-btn {
    font-family: var(--mono); font-size: 10px; color: var(--text3);
    background: var(--bg2); border: 1px solid var(--border);
    padding: 3px 8px; border-radius: 4px; cursor: pointer; transition: 0.15s;
  }
  .ctrl-btn:hover, .ctrl-btn.active { color: var(--accent); border-color: rgba(99,179,237,0.4); }
  .chart-wrap { height: 220px; position: relative; }

  /* ── Stats row ── */
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .stat-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px; text-align: center;
  }
  .stat-val { font-family: var(--mono); font-size: 22px; font-weight: 600; color: var(--accent2); }
  .stat-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin-top: 3px; }

  /* ── Right panel ── */
  .right {
    background: var(--bg1);
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .right-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    font-family: var(--mono); font-size: 11px; color: var(--text2);
    text-transform: uppercase; letter-spacing: 1.5px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .alert-count {
    background: rgba(229,62,62,0.15); color: var(--red);
    font-size: 10px; font-weight: 600;
    padding: 2px 7px; border-radius: 10px;
  }
  .alerts-list { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 6px; }

  .alert-item {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 7px; padding: 10px 12px;
    border-left: 3px solid transparent;
    animation: slide-in 0.3s ease;
  }
  @keyframes slide-in { from{opacity:0;transform:translateX(10px)} to{opacity:1;transform:none} }
  .alert-item.CRITICAL { border-left-color: var(--red2); }
  .alert-item.WARNING  { border-left-color: var(--yellow); }
  .alert-sensor { font-family: var(--mono); font-size: 10px; color: var(--text2); text-transform: uppercase; margin-bottom: 3px; }
  .alert-msg    { font-size: 11px; color: var(--text); line-height: 1.4; }
  .alert-ts     { font-family: var(--mono); font-size: 9px; color: var(--text3); margin-top: 4px; }

  .no-alerts { text-align: center; padding: 40px 20px; color: var(--text3); font-family: var(--mono); font-size: 11px; }
  .no-alerts-icon { font-size: 28px; margin-bottom: 8px; }

  /* ── Footer ── */
  .right-footer {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    display: flex; gap: 8px;
  }
  .export-btn {
    flex: 1; font-family: var(--mono); font-size: 11px;
    background: var(--bg2); color: var(--text2); border: 1px solid var(--border);
    padding: 7px; border-radius: 6px; cursor: pointer; transition: 0.15s; text-align: center;
    text-decoration: none; display: block;
  }
  .export-btn:hover { border-color: rgba(99,179,237,0.5); color: var(--accent); }

  /* ── Loading overlay ── */
  #loading {
    position: fixed; inset: 0; background: var(--bg0);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 999; transition: opacity 0.5s;
  }
  .loading-logo { font-family: var(--mono); font-size: 22px; color: var(--accent); margin-bottom: 12px; }
  .loading-sub  { font-family: var(--mono); font-size: 11px; color: var(--text3); animation: blink 1s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .loading-bar { width: 200px; height: 2px; background: var(--bg2); border-radius: 2px; margin-top: 20px; overflow: hidden; }
  .loading-fill { height: 100%; background: var(--accent); border-radius: 2px; animation: load-anim 1.5s ease forwards; }
  @keyframes load-anim { from{width:0} to{width:100%} }

  @media (max-width: 900px) {
    main { grid-template-columns: 1fr; }
    .right { display: none; }
    .sensor-grid { grid-template-columns: repeat(2, 1fr); }
    .stats-row { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<!-- Loading Overlay -->
<div id="loading">
  <div class="loading-logo">⚡ IIoT Sentinel</div>
  <div class="loading-sub">Connecting to factory floor...</div>
  <div class="loading-bar"><div class="loading-fill"></div></div>
</div>

<div class="app">
  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-icon">⚡</div>
      <div>
        <div class="logo-text">IIoT Sentinel</div>
        <div class="logo-sub">Industrial Monitoring System</div>
      </div>
    </div>
    <div class="header-right">
      <div class="conn-badge"><div class="conn-dot" id="connDot"></div><span id="connLabel">Connecting...</span></div>
      <div class="ts-display" id="tsDisplay">--:--:--</div>
    </div>
  </header>

  <main>
    <!-- Left Panel -->
    <div class="left">
      <!-- Sensor Cards -->
      <div class="section-label">Live Sensors</div>
      <div class="sensor-grid" id="sensorGrid">
        <!-- injected by JS -->
      </div>

      <!-- Main Chart -->
      <div class="chart-card">
        <div class="chart-header">
          <div class="chart-title" id="chartTitle">— Select a sensor</div>
          <div class="chart-controls">
            <button class="ctrl-btn active" onclick="setWindow(60)">1m</button>
            <button class="ctrl-btn" onclick="setWindow(300)">5m</button>
            <button class="ctrl-btn" onclick="setWindow(600)">10m</button>
          </div>
        </div>
        <div class="chart-wrap"><canvas id="mainChart"></canvas></div>
      </div>

      <!-- Summary Stats -->
      <div class="section-label">Session Summary</div>
      <div class="stats-row" id="statsRow">
        <div class="stat-card"><div class="stat-val" id="s-total">0</div><div class="stat-label">Readings</div></div>
        <div class="stat-card"><div class="stat-val" id="s-alerts">0</div><div class="stat-label">Alerts</div></div>
        <div class="stat-card"><div class="stat-val" id="s-critical">0</div><div class="stat-label">Critical</div></div>
        <div class="stat-card"><div class="stat-val" id="s-uptime">0s</div><div class="stat-label">Uptime</div></div>
      </div>
    </div>

    <!-- Right Panel -->
    <div class="right">
      <div class="right-header">
        Alert Feed
        <span class="alert-count" id="alertCount">0</span>
      </div>
      <div class="alerts-list" id="alertsList">
        <div class="no-alerts"><div class="no-alerts-icon">✅</div>No alerts yet.</div>
      </div>
      <div class="right-footer">
        <a class="export-btn" href="/api/export" download="sentinel_export.csv">⬇ Export CSV</a>
      </div>
    </div>
  </main>
</div>

<script>
// ── Config ──────────────────────────────────────────────────────────────────
const COLORS = {
  temperature: '#f6ad55',
  humidity:    '#63b3ed',
  pressure:    '#a78bfa',
  vibration:   '#fc8181',
  power:       '#68d391',
  flow_rate:   '#76e4f7',
};
const ICONS = {
  temperature: '🌡',
  humidity:    '💧',
  pressure:    '⚡',
  vibration:   '📳',
  power:       '🔋',
  flow_rate:   '🌊',
};

// ── State ───────────────────────────────────────────────────────────────────
let activeSensor    = 'temperature';
let mainChart       = null;
let miniCharts      = {};
let chartWindow     = 60;
let liveBuffer      = {};   // sensor → [{ts, value}]
let startTime       = Date.now();
let totalReadings   = 0;
let totalAlerts     = 0;
let totalCritical   = 0;
let alertLog        = [];

// ── Init chart ───────────────────────────────────────────────────────────────
function initMainChart() {
  const ctx = document.getElementById('mainChart').getContext('2d');
  mainChart = new Chart(ctx, {
    type: 'line',
    data: { labels: [], datasets: [{
      label: activeSensor,
      data: [],
      borderColor: COLORS[activeSensor],
      backgroundColor: COLORS[activeSensor] + '18',
      borderWidth: 1.5,
      fill: true,
      tension: 0.4,
      pointRadius: 0,
      pointHoverRadius: 4,
    }]},
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#0d1424',
          borderColor: 'rgba(99,179,237,0.2)',
          borderWidth: 1,
          titleColor: '#94a3b8',
          bodyColor: '#e2e8f0',
          titleFont: { family: 'JetBrains Mono', size: 10 },
          bodyFont:  { family: 'JetBrains Mono', size: 12 },
        },
      },
      scales: {
        x: {
          ticks: { color: '#475569', font: { family: 'JetBrains Mono', size: 9 }, maxTicksLimit: 6 },
          grid:  { color: 'rgba(99,179,237,0.05)' },
          border: { color: 'rgba(99,179,237,0.1)' },
        },
        y: {
          ticks: { color: '#475569', font: { family: 'JetBrains Mono', size: 10 } },
          grid:  { color: 'rgba(99,179,237,0.05)' },
          border: { color: 'rgba(99,179,237,0.1)' },
        },
      },
    },
  });
}

function initMiniChart(sensor, canvasId) {
  const ctx = document.getElementById(canvasId).getContext('2d');
  miniCharts[sensor] = new Chart(ctx, {
    type: 'line',
    data: { labels: [], datasets: [{
      data: [],
      borderColor: COLORS[sensor],
      borderWidth: 1.2,
      fill: false,
      tension: 0.4,
      pointRadius: 0,
    }]},
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      plugins: { legend: { display: false }, tooltip: { enabled: false } },
      scales: { x: { display: false }, y: { display: false } },
    },
  });
}

// ── Sensor card rendering ────────────────────────────────────────────────────
function buildSensorCard(sensor, r) {
  const color = COLORS[sensor];
  const icon  = ICONS[sensor] || '📡';
  const id    = 'card-' + sensor;
  const cid   = 'mini-' + sensor;
  return `
    <div class="sensor-card status-${r.status} ${sensor===activeSensor?'active':''}"
         id="${id}" style="--card-color:${color}" onclick="selectSensor('${sensor}')">
      <div class="card-header">
        <div class="card-name">${icon} ${sensor.replace('_',' ')}</div>
        <div class="card-status">${r.status}</div>
      </div>
      <div>
        <span class="card-value" id="val-${sensor}">—</span>
        <span class="card-unit">${r.unit}</span>
      </div>
      <div class="card-mini-chart"><canvas id="${cid}" height="36"></canvas></div>
    </div>`;
}

function updateSensorCard(sensor, r) {
  const card = document.getElementById('card-' + sensor);
  if (!card) return;

  card.className = `sensor-card status-${r.status} ${sensor===activeSensor?'active':''}`;
  card.style.setProperty('--card-color', COLORS[sensor]);

  const valEl = document.getElementById('val-' + sensor);
  if (valEl) valEl.textContent = r.value;

  const statusEl = card.querySelector('.card-status');
  if (statusEl) statusEl.textContent = r.status;
}

function selectSensor(sensor) {
  activeSensor = sensor;
  document.querySelectorAll('.sensor-card').forEach(c => c.classList.remove('active'));
  const card = document.getElementById('card-' + sensor);
  if (card) card.classList.add('active');

  const buf = (liveBuffer[sensor] || []).slice(-chartWindow);
  mainChart.data.labels = buf.map(p => p.ts.slice(11,19));
  mainChart.data.datasets[0].data = buf.map(p => p.value);
  mainChart.data.datasets[0].borderColor = COLORS[sensor];
  mainChart.data.datasets[0].backgroundColor = COLORS[sensor] + '18';
  mainChart.data.datasets[0].label = sensor;
  mainChart.update('none');
  document.getElementById('chartTitle').textContent = `${ICONS[sensor]} ${sensor.replace('_',' ')} — Live Feed`;
}

function setWindow(w) {
  chartWindow = w;
  document.querySelectorAll('.ctrl-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  selectSensor(activeSensor);
}

// ── Live data update ─────────────────────────────────────────────────────────
function onData(payload) {
  const { ts, readings, alerts } = payload;
  totalReadings += Object.keys(readings).length;

  // Update sensor cards + mini charts
  for (const [sensor, r] of Object.entries(readings)) {
    if (!liveBuffer[sensor]) liveBuffer[sensor] = [];
    liveBuffer[sensor].push({ ts, value: r.value });
    if (liveBuffer[sensor].length > 600) liveBuffer[sensor].shift();

    updateSensorCard(sensor, r);

    if (miniCharts[sensor]) {
      const mc = miniCharts[sensor];
      const buf = liveBuffer[sensor].slice(-30);
      mc.data.labels = buf.map(p => p.ts);
      mc.data.datasets[0].data = buf.map(p => p.value);
      mc.update('none');
    }
  }

  // Update main chart
  if (readings[activeSensor]) {
    const buf = liveBuffer[activeSensor].slice(-chartWindow);
    mainChart.data.labels = buf.map(p => p.ts.slice(11,19));
    mainChart.data.datasets[0].data = buf.map(p => p.value);
    mainChart.update('none');
  }

  // Alerts
  if (alerts.length) {
    totalAlerts += alerts.length;
    totalCritical += alerts.filter(a => a.severity === 'CRITICAL').length;
    document.getElementById('alertCount').textContent = totalAlerts;

    const list = document.getElementById('alertsList');
    const noAlerts = list.querySelector('.no-alerts');
    if (noAlerts) noAlerts.remove();

    for (const a of alerts.slice(0, 3)) {
      const el = document.createElement('div');
      el.className = `alert-item ${a.severity}`;
      el.innerHTML = `
        <div class="alert-sensor">${a.sensor.replace('_',' ')} · ${a.method.replace('_',' ')}</div>
        <div class="alert-msg">${a.message}</div>
        <div class="alert-ts">${ts.slice(11,19)} UTC</div>`;
      list.prepend(el);

      // Keep max 30 alerts visible
      while (list.children.length > 30) list.lastChild.remove();
    }
  }

  // Stats
  document.getElementById('s-total').textContent = totalReadings;
  document.getElementById('s-alerts').textContent = totalAlerts;
  document.getElementById('s-critical').textContent = totalCritical;
  const uptime = Math.floor((Date.now() - startTime) / 1000);
  document.getElementById('s-uptime').textContent = uptime < 60
    ? uptime + 's' : Math.floor(uptime/60) + 'm ' + (uptime%60) + 's';

  // Clock
  document.getElementById('tsDisplay').textContent = ts.slice(11,19) + ' UTC';
}

// ── WebSocket ────────────────────────────────────────────────────────────────
function connect() {
  const ws = new WebSocket(`ws://${location.host}/ws`);

  ws.onopen = () => {
    document.getElementById('connDot').style.background = '#48bb78';
    document.getElementById('connLabel').textContent = 'Connected';
    document.getElementById('loading').style.opacity = '0';
    setTimeout(() => document.getElementById('loading').style.display = 'none', 500);
  };

  ws.onmessage = e => onData(JSON.parse(e.data));

  ws.onclose = () => {
    document.getElementById('connDot').style.background = '#fc8181';
    document.getElementById('connLabel').textContent = 'Reconnecting...';
    setTimeout(connect, 3000);
  };

  ws.onerror = () => ws.close();

  // Keep-alive ping
  setInterval(() => { if (ws.readyState === 1) ws.send('ping'); }, 20000);
}

// ── Boot ─────────────────────────────────────────────────────────────────────
(async function boot() {
  // Fetch first reading to build cards
  const res  = await fetch('/api/history?sensor=temperature&limit=1').catch(()=>null);
  const hist = res ? await res.json() : [];

  // Sensors we know about
  const sensors = ['temperature','humidity','pressure','vibration','power','flow_rate'];
  const mockR   = (s) => ({ value: '—', unit: { temperature:'°C', humidity:'%RH', pressure:'bar', vibration:'mm/s', power:'kW', flow_rate:'L/min' }[s]||'', status: 'NORMAL' });

  const grid = document.getElementById('sensorGrid');
  grid.innerHTML = sensors.map(s => buildSensorCard(s, mockR(s))).join('');

  initMainChart();
  sensors.forEach(s => initMiniChart(s, 'mini-' + s));
  selectSensor('temperature');
  connect();
})();
</script>
</body>
</html>
